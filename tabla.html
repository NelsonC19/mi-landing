<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabla de posiciones</title>
<link rel="stylesheet" href="styles.css">

<style>
.tabla-container{
  max-width:1000px;
  margin:auto;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th, td{
  padding:10px;
  text-align:center;
  border-bottom:1px solid #ddd;
}

th{
  background:#182a69;
  color:white;
}

tr:hover{
  background:#f2f2f2;
}
</style>

</head>
<body>

<header class="header">
  <h1>Mi Liga 2026</h1>
  <nav>
    <ul>
      <li><a href="index.html">Inicio</a></li>
      <li><a href="tabla.html">Tabla de posiciones</a></li>
      <li><a href="goleadores.html">Tabla de goleadores</a></li>
      <li><a href="tarjetas.html">Tarjetas</a></li>
      <li><a href="fixture.html">Fixture</a></li>
    </ul>
  </nav>
</header>

<section class="section">
  <h2>Tabla de posiciones</h2>

  <div class="tabla-container">
    <table id="tabla">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>

</section>

<script>

// 🔥 PEGA AQUÍ TU LINK CSV
const sheetURL = "https://docs.google.com/spreadsheets/d/1BnXAjeTz-Qhdg11ALhUrfhruAQGgs33LEtzFalz29Os/gviz/tq?tqx=out:json&gid=68472640";

fetch(sheetURL)
  .then(response => response.text())
  .then(data => {
    const rows = data.split("\n").map(row => row.split(","));
    
    const tableHead = document.querySelector("#tabla thead");
    const tableBody = document.querySelector("#tabla tbody");

    // Crear encabezado
    const headerRow = document.createElement("tr");
    rows[0].forEach(cell => {
      const th = document.createElement("th");
      th.textContent = cell;
      headerRow.appendChild(th);
    });
    tableHead.appendChild(headerRow);

    // Crear filas
    rows.slice(1).forEach(row => {
      const tr = document.createElement("tr");
      row.forEach(cell => {
        const td = document.createElement("td");
        td.textContent = cell;
        tr.appendChild(td);
      });
      tableBody.appendChild(tr);
    });
  });

</script>

</body>
</html>
