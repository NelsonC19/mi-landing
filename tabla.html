<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabla de posiciones</title>
<link rel="stylesheet" href="styles.css">

<style>
.tabla-container{
  max-width:1000px;
  margin:auto;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th, td{
  padding:10px;
  text-align:center;
  border-bottom:1px solid #ddd;
}

th{
  background:#182a69;
  color:white;
}

tr:hover{
  background:#f2f2f2;
}
</style>

</head>
<body>

<header class="header">
  <h1>Mi Liga 2026</h1>
  <nav>
    <ul>
      <li><a href="index.html">Inicio</a></li>
      <li><a href="tabla.html">Tabla de posiciones</a></li>
      <li><a href="goleadores.html">Tabla de goleadores</a></li>
      <li><a href="tarjetas.html">Tarjetas</a></li>
      <li><a href="fixture.html">Fixture</a></li>
    </ul>
  </nav>
</header>

<section class="section">
  <h2>Tabla de posiciones</h2>

  <div class="tabla-container">
    <table id="tabla">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>

</section>


  <script>

const sheetURL = "https://docs.google.com/spreadsheets/d/1BnXAjeTz-Qhdg11ALhUrfhruAQGgs33LEtzFalz29Os/gviz/tq?tqx=out:json&gid=68472640";

fetch(sheetURL)
  .then(res => res.text())
  .then(data => {
    
    // 🔥 Limpiar respuesta Google
    const json = JSON.parse(
      data.substring(
        data.indexOf("{"),
        data.lastIndexOf("}") + 1
      )
    );

    const table = document.getElementById("tabla");
    const thead = table.querySelector("thead");
    const tbody = table.querySelector("tbody");

    const cols = json.table.cols;
    const rows = json.table.rows;

    // Encabezados
    const headerRow = document.createElement("tr");
    cols.forEach(col => {
      const th = document.createElement("th");
      th.textContent = col.label;
      headerRow.appendChild(th);
    });
    thead.appendChild(headerRow);

    // Filas
    rows.forEach(row => {
      const tr = document.createElement("tr");
      row.c.forEach(cell => {
        const td = document.createElement("td");
        td.textContent = cell ? cell.v : "";
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });

  });

</script>

</body>
</html>
