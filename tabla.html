<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabla de posiciones</title>
<link rel="stylesheet" href="styles.css">

<style>
.tabla-container{
  max-width:1000px;
  margin:auto;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th, td{
  padding:10px;
  text-align:center;
  border-bottom:1px solid #ddd;
}

th{
  background:#182a69;
  color:white;
}

tr:hover{
  background:#f2f2f2;
}
  
/* Logos en tabla */
td img{
  display:block;
  margin:auto;
}

/* ===== Alinear columna Club ===== */
.col-club{
  text-align:left;
  font-weight:600;
  padding-left:12px;
}

/* ===== Resaltar columna Pts ===== */
.col-pts{
  background:#949494;
  color:white;
  font-weight:800;
}

/* Hover manteniendo resaltado */
tr:hover .col-pts{
  background:#0f1c4d;
}

/* ===== Columna Club ===== */
.col-club{
  text-align:left;
  font-weight:600;
  padding-left:12px;
}

/* ===== Columnas estadísticas D - J ===== */
.col-stats{
  color:#9aa0a6; /* gris claro elegante */
  font-weight:500;
}

/* ===== Columna Pts (K) ===== */
.col-pts{
  background:#f2f3f5; /* gris muy claro */
  font-weight:800;
  color:#222;
}

/* Hover manteniendo estilo */
tr:hover .col-pts{
  background:#e8eaed;
}

</style>

</head>
<body>

<header class="header">
  <h1>Mi Liga 2026</h1>
  <nav>
    <ul>
      <li><a href="index.html">Inicio</a></li>
      <li><a href="tabla.html">Tabla de posiciones</a></li>
      <li><a href="goleadores.html">Tabla de goleadores</a></li>
      <li><a href="tarjetas.html">Tarjetas</a></li>
      <li><a href="fixture.html">Fixture</a></li>
    </ul>
  </nav>
</header>

<section class="section">
  <h2>Tabla de posiciones</h2>

  <div class="tabla-container">
    <table id="tabla">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>

</section>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/1BnXAjeTz-Qhdg11ALhUrfhruAQGgs33LEtzFalz29Os/gviz/tq?tqx=out:json&gid=68472640";

fetch(sheetURL)
  .then(res => res.text())
  .then(data => {

    const json = JSON.parse(
      data.substring(
        data.indexOf("{"),
        data.lastIndexOf("}") + 1
      )
    );

    const table = document.getElementById("tabla");
    const thead = table.querySelector("thead");
    const tbody = table.querySelector("tbody");

    const cols = json.table.cols;
    const rows = json.table.rows;

    // 🔹 ENCABEZADOS
    const headerRow = document.createElement("tr");
    cols.forEach((col, index) => {
      const th = document.createElement("th");
      th.textContent = col.label;


      // Columna Club
if(index === 2) td.classList.add("col-club");

// Columnas D hasta J (gris texto)
if(index >= 3 && index <= 9) td.classList.add("col-stats");

// Última columna (Pts - gris fondo)
if(index === 10) td.classList.add("col-pts");
      
      
      headerRow.appendChild(th);
    });
    thead.appendChild(headerRow);

    // 🔹 FILAS
    rows.forEach(row => {
      const tr = document.createElement("tr");

      row.c.forEach((cell, index) => {
        const td = document.createElement("td");

        if (!cell) {
          td.textContent = "";
        } 
        else if (index === 1) {
          const img = document.createElement("img");
          img.src = cell.v;
          img.style.width = "28px";
          img.style.height = "28px";
          img.style.objectFit = "contain";
          td.appendChild(img);
        } 
        else {
          td.textContent = cell.v;
        }

        if(index === 2) td.classList.add("col-club");
        if(index === cols.length - 1) td.classList.add("col-pts");

        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });

  });

</script>

</body>
</html>
